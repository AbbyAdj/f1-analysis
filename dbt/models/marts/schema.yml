version: 2

models:
  - name: dim_constructors
    description: "Dimension table for constructors (teams). One row per constructor."
    columns:
      - name: constructor_id
        description: "Unique constructor identifier (primary key)"
        data_tests:
          - not_null
          - unique
      - name: constructor_name
        description: "Team name"
        data_tests:
          - not_null
      - name: nationality
        description: "Team's nationality"   

  - name: dim_drivers
    description: "Dimension table for drivers. One row per driver."
    columns:
      - name: driver_id
        description: "Unique driver identifier (primary key)"
        data_tests:
          - not_null
          - unique
      - name: first_name
        description: "Driver's first name"
        data_tests:
          - not_null
      - name: last_name
        description: "Driver's last name"
        data_tests:
          - not_null
  
  - name: dim_races
    description: "Dimension table for races. One row per race in the 2025 season."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - season
              - season_round
    columns:
      - name: season
        description: "Year of the race"
        data_tests:
          - not_null
      - name: season_round
        description: "Race number in the season (1-24)"
        data_tests: 
          - not_null
      - name: race_name
        description: "Name of the race      (e.g., Australian Grand Prix)"      
        data_tests:
          - not_null  

  - name: fct_race_results
    description: "Intermediate: race results enriched with driver and constructor names"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - season
              - season_round
              - driver_id
    columns:
      - name: season
        description: "Season year"
        data_tests:
          - not_null
      - name: season_round
        description: "Race round number in the season"
        data_tests: 
          - not_null
      - name: driver_id
        description: "Unique driver identifier (foreign key to stg_drivers)"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_drivers')
                field: driver_id
      - name: constructor_id
        description: "Unique constructor identifier (foreign key to stg_constructors)"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_constructors')
                field: constructor_id
      - name: circuit_id
        description: "Unique circuit identifier (foreign key to stg_races)"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_races')
                field: circuit_id
      - name: positions_gained
        description: "Positive if the driver gained positions, negative otherwise"
      - name: is_winner
        description: "True if the driver  won the race, false otherwise"  
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false] 
      - name: is_podium
        description: "True if the driver finished in the top 3, false otherwise"  
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_dnf
        description: "True if the driver did not finish the race, false otherwise"  
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false] 
      - name: is_points_finish
        description: "True if the driver finished in the points, false otherwise"  
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
      - name: race_points
        description: "Number of points scored by the driver in the race"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:  
                min_value: 0
                max_value: 25

  - name: driver_championship_progression
    description: "Championship standings progression showing cumulative points for each driver after each race"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - season
              - season_round
              - driver_id
    columns:
      - name: season
        description: "Year of the race"
        data_tests:
          - not_null
      - name: season_round
        description: "Race number in the season"
        data_tests:
          - not_null
      - name: driver_id
        description: "Unique driver identifier (foreign key)"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_drivers')
                field: driver_id
      - name: driver_full_name
        description: "Driver's full name"
        data_tests:
          - not_null
      - name: race_points
        description: "Points earned in this specific race"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 26
      - name: cum_race_points
        description: "Cumulative championship points up to and including this race"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1000
      - name: points_ranking
        description: "Driver's championship position after this race (1=leader)"
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 25
      - name: race_date
        description: "Date when the race took place"
        data_tests:
          - not_null   