version: 2

sources:
  - name: f1_raw
    description: "Raw F1 2025 data loaded from Jolpica API via S3"
    database: f1_db
    schema: raw

    tables:
      - name: drivers
        description: "Raw drivers table. One row per driver."
        columns:
          - name: driver_id
            description: "Unique driver identifier (e.g., 'norris', 'max_verstappen')"
            data_tests:
              - not_null
              - unique
          - name: first_name
            data_tests:
              - not_null
          - name: last_name
            data_tests:
              - not_null

      - name: constructors
        description: "Raw constructors table. One row per team."
        columns:
          - name: constructor_id
            description: "Unique constructor identifier (e.g., 'mclaren', 'red_bull')"
            data_tests:
              - not_null
              - unique
          - name: constructor_name
            data_tests:
              - not_null

      - name: races
        description: "Raw races table. One row per race in the 2025 season."
        columns:
          - name: season
            description: "Year of the race"
            data_tests:
              - not_null
          - name: round
            description: "Race number in the season (1-24)"
            data_tests:
              - not_null
          - name: race_name
            data_tests:
              - not_null
          - name: race_date
            data_tests:
              - not_null
          - name: race_time
            data_tests:
              - not_null
          - name: circuit_id
            data_tests:
              - not_null
          - name: circuit_name
            data_tests:
              - not_null
          - name: circuit_locality
            data_tests:
              - not_null
          - name: circuit_country
            data_tests:
              - not_null

      - name: race_results
        description: "Raw race results table. One row per driver per race."
        columns:
          - name: season
            description: "Year of the race"
            data_tests:
              - not_null
          - name: round
            description: "Race number in the season"
            data_tests:
              - not_null
          - name: driver_id
            description: "Driver identifier"
            data_tests:
              - not_null
          - name: constructor_id
            description: "Constructor identifier"
            data_tests:
              - not_null
