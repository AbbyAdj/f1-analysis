name: 'f1_analysis'
profile: 'f1_analysis'
version: '1.0.0'
config-version: 2

model-paths: ["models"]
macro-paths: ["macros"]
test-paths: ["tests"]
seed-paths: ["seeds"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  +persist_docs:
    relation: true
    columns: true
  f1_analysis:
    staging:
      +materialized: view
      +on_schema_change: fail
      +schema: staging
    intermediate:
      +materialized: view
      +on_schema_change: fail
      +schema: intermediate
    marts:
      +materialized: table
      +on_schema_change: fail

require-dbt-version: [">=1.5.0"]

data_tests:
  +store_failures: true
